<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com; 
               style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; 
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: http://127.0.0.1:8000; 
               connect-src 'self' http://127.0.0.1:8000;">
    <title>Portfolio</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script src="static/js/audio-control.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <audio id="global-audio" preload="auto"></audio>
    <div id="bridge-audio"></div>

    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
        </div>
    </nav>

    <main class="grid-container">
    <section class="profile-area">
        <img src="static/images/default.jpg" alt="Profile" class="profile-pic">
        <div class="social-links">
            <a href="https://github.com/anushkav03">GitHub</a>
            <a href="https://www.linkedin.com/in/anushkav6/">LinkedIn</a>
        </div>
    </section>

    <section class="about-section">
        <div class="card">
            <h1>About Me</h1>
            <div hx-get="static/files/about.txt" 
                hx-trigger="load" 
                class="bio-content">
                <p>Loading bio...</p>
            </div>
            <a
                href="static/files/resume.pdf" 
                target="_blank"
                rel="noopener noreferrer"
                class="resume-link"
                >View Resume (PDF)
            </a>
        </div>
    </section>

    <section class="game-zone">
        <div id="popup-swap" class="game-placeholder">
            <button 
                class="btn play-music"
                hx-post="http://127.0.0.1:8000/play"
                hx-trigger="click"
                hx-target="#bridge-audio"> Play
            </button>

            <button 
                class="btn play-music"
                hx-post="http://127.0.0.1:8000/pause"
                hx-trigger="click"
                hx-target="#bridge-audio"> Pause
            </button>

            <button 
                class="btn open-popup"
                hx-post="http://127.0.0.1:8000/open-popup"
                hx-trigger="click"
                hx-target="#popup-swap"
                hx-swap="beforeend"> Open Popup
            </button>
        </div>
    </section>
    </main>

</body>
</html>
